<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>On Boarding Program - Reward Card</title>
    
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">

    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600;700&display=swap');
        body { font-family: 'Kanit', sans-serif; background-color: #f4f4f4; overscroll-behavior-y: none; }
        .wurth-red { color: #CC0000; }
        .bg-wurth-red { background-color: #CC0000; }
        .border-wurth-red { border-color: #CC0000; }
        
        @keyframes stampPop {
            0% { transform: scale(0); opacity: 0; }
            50% { transform: scale(1.3); opacity: 1; }
            100% { transform: scale(1); opacity: 1; }
        }
        .stamp-animate {
            animation: stampPop 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }
        
        .bg-pattern {
            background-color: #CC0000;
            background-image: radial-gradient(#990000 1px, transparent 1px);
            background-size: 20px 20px;
        }
        ::-webkit-scrollbar { display: none; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        // URL ของ Cloudflare Worker ของคุณ
        const GAS_URL = 'https://onboarding-stamps-api.wurthth1995.workers.dev/'; 
        const TOTAL_STAMPS = 14;
        const LIFF_ID = '2009175418-UODHvYrB';

        const App = () => {
            // 1. ประกาศ State ทั้งหมดไว้บนสุดเสมอ (ห้ามสลับ)
            const [profile, setProfile] = React.useState(null);
            const [points, setPoints] = React.useState(0);
            const [loading, setLoading] = React.useState(true);
            const [pinInput, setPinInput] = React.useState('');
            const [message, setMessage] = React.useState({ show: false, text: '', type: '' });
            const [recentStampIndex, setRecentStampIndex] = React.useState(-1);
            const [needManualLogin, setNeedManualLogin] = React.useState(false);
            
            // ประกาศไฟล์เสียง
            const successSound = React.useRef(typeof Audio !== "undefined" ? new Audio('https://assets.mixkit.co/active_storage/sfx/2013/2013-preview.mp3') : null);

            // 2. ประกาศฟังก์ชันช่วยเหลือ (Helper Functions)
            const showMessage = (text, type) => {
                setMessage({ show: true, text, type });
                setTimeout(() => setMessage({ show: false, text: '', type: '' }), 3000);
            };

            const handleManualLogin = () => {
                liff.login({ redirectUri: window.location.href });
            };

            const fetchWithRetry = async (url, options = {}, retries = 2) => {
                const fetchOptions = { 
                    ...options, 
                    redirect: 'follow', 
                    cache: 'no-store', 
                    headers: {
                        'Cache-Control': 'no-cache, no-store, must-revalidate',
                        'Pragma': 'no-cache',
                        'Expires': '0'
                    }
                };
                
                for (let i = 0; i <= retries; i++) {
                    try {
                        const res = await fetch(url, fetchOptions);
                        if (!res.ok) throw new Error(`HTTP error! status: ${res.status}`);
                        
                        const contentType = res.headers.get("content-type");
                        if (contentType && contentType.includes("application/json")) {
                            return await res.json();
                        } else {
                            throw new Error("Response is not JSON.");
                        }
                    } catch (error) {
                        if (i === retries) throw error; 
                        await new Promise(resolve => setTimeout(resolve, 1000)); 
                    }
                }
            };

            const fetchUserData = async (user) => {
                try {
                    setLoading(true);
                    const cacheBuster = new Date().getTime();
                    const url = `${GAS_URL}?action=getUser&userId=${user.userId}&displayName=${encodeURIComponent(user.displayName)}&t=${cacheBuster}`;
                    
                    const data = await fetchWithRetry(url);
                    if (data && data.status === 'success') {
                        setPoints(parseInt(data.points, 10) || 0);
                    }
                } catch (error) {
                    console.error('Error fetching user:', error);
                    // บังคับให้พ่นสาเหตุที่แท้จริงออกมาบนหน้าจอเลย
                    showMessage(`โหลดข้อมูลไม่ได้: ${error.message}`, 'error');
                } finally {
                    setLoading(false);
                }
            };

            const initializeLiff = async () => {
                try {
                    await liff.init({ 
                        liffId: LIFF_ID,
                        withLoginOnExternalBrowser: true 
                    });
                    
                    if (liff.isLoggedIn()) {
                        const userProfile = await liff.getProfile();
                        if (userProfile && userProfile.userId) {
                            setProfile(userProfile);
                            fetchUserData(userProfile);
                        } else {
                            throw new Error('Profile incomplete');
                        }
                    } else {
                        setLoading(false);
                        setNeedManualLogin(true);
                    }
                } catch (err) {
                    setLoading(false);
                    setNeedManualLogin(true); 
                }
            };

            const animateNewStamp = () => {
                if (navigator.vibrate) { try { navigator.vibrate(100); } catch(e) {} }
                if (successSound.current) {
                    successSound.current.currentTime = 0;
                    successSound.current.play().catch(e => {});
                }
                setPoints(prev => {
                    const newPoints = Math.min(prev + 1, TOTAL_STAMPS);
                    setRecentStampIndex(newPoints - 1);
                    return newPoints;
                });
            };

            const handleClaimToken = async (tokenString) => {
                const cleanToken = tokenString.trim().toUpperCase();
                if (!cleanToken) return;

                try {
                    setLoading(true);
                    const cacheBuster = new Date().getTime();
                    const url = `${GAS_URL}?action=addPoint&userId=${profile.userId}&pin=${encodeURIComponent(cleanToken)}&t=${cacheBuster}`;
                    
                    const data = await fetchWithRetry(url, { method: 'GET' });
                    
                    if (data && data.status === 'success') {
                        animateNewStamp();
                        showMessage('สะสมแต้มสำเร็จ!', 'success');
                    } else {
                        showMessage(data?.message || 'รหัสนี้ถูกใช้งานไปแล้ว', 'error');
                    }
                } catch (error) {
                    showMessage('ระบบขัดข้อง กรุณาลองใหม่', 'error');
                } finally {
                    setLoading(false);
                    setPinInput('');
                }
            };

            const scanQRCode = () => {
                if (liff.scanCodeV2) {
                    liff.scanCodeV2().then((result) => {
                        if (result && result.value) handleClaimToken(result.value);
                    }).catch(() => showMessage('ไม่สามารถเปิดกล้องสแกนได้', 'error'));
                } else {
                    showMessage('อุปกรณ์ไม่รองรับการสแกน', 'warning');
                }
            };

            // 3. useEffect ต้องอยู่หลังสุด หลังจากสร้างฟังก์ชันเสร็จแล้ว
            React.useEffect(() => {
                initializeLiff();
            }, []);

            // 4. ส่วนแสดงผล UI (Render)
            if (loading && !profile) {
                return (
                    <div className="flex flex-col items-center justify-center min-h-screen bg-pattern">
                        <div className="animate-spin rounded-full h-12 w-12 border-4 border-white border-t-transparent"></div>
                        <p className="text-white mt-4 font-semibold text-lg animate-pulse">กำลังโหลดข้อมูล...</p>
                    </div>
                );
            }

            if (needManualLogin && !profile) {
                return (
                    <div className="flex flex-col items-center justify-center min-h-screen bg-gray-100 px-6 text-center">
                        <div className="bg-white p-8 rounded-2xl shadow-lg max-w-sm w-full border-t-4 border-wurth-red">
                            <div className="bg-green-100 w-20 h-20 rounded-full flex items-center justify-center mx-auto mb-6">
                                <i className="fab fa-line text-5xl text-green-500"></i>
                            </div>
                            <h2 className="text-xl font-bold text-gray-800 mb-2">เข้าสู่ระบบ LINE</h2>
                            <p className="text-gray-500 text-sm mb-6">กรุณาเข้าสู่ระบบด้วยบัญชี LINE ของคุณเพื่อเริ่มสะสมแต้ม</p>
                            <button onClick={handleManualLogin} className="w-full bg-[#06C755] hover:bg-green-600 text-white font-bold py-4 rounded-xl transition-transform active:scale-95 shadow-md flex items-center justify-center">
                                <i className="fab fa-line text-2xl mr-2"></i> ล็อกอินด้วย LINE
                            </button>
                        </div>
                    </div>
                );
            }

            return (
                <div className="min-h-screen pb-10 flex flex-col bg-gray-100">
                    {/* Header */}
                    <div className="bg-pattern pt-8 pb-16 px-4 rounded-b-[2.5rem] shadow-lg relative">
                        <div className="flex items-center justify-between">
                            <div className="bg-white p-2 rounded-xl shadow-sm">
                                <img src="https://www.wuerth.co.th/media/system/layout_wl2bootstrap/bootstrap_system_images/wuerth_logo_big.png" alt="Wuerth Logo" className="h-6 sm:h-8 w-auto" />
                            </div>
                            <h1 className="text-white text-xl font-bold tracking-wide text-right">ON BOARDING <br/><span className="text-gray-200 text-sm font-normal">PROGRAM</span></h1>
                        </div>
                        <div className="absolute -bottom-12 left-0 right-0 px-6">
                            <div className="bg-white rounded-2xl shadow-xl p-4 flex items-center space-x-4 border-t-4 border-wurth-red">
                                <img src={profile?.pictureUrl || 'https://via.placeholder.com/150'} alt="Profile" className="w-16 h-16 rounded-full border-2 border-gray-100 shadow-sm object-cover" />
                                <div>
                                    <h2 className="text-gray-800 font-bold text-lg">{profile?.displayName || 'User'}</h2>
                                    <div className="flex items-center text-sm text-gray-500 mt-1"><div className="w-2 h-2 rounded-full bg-green-500 mr-2"></div>สมาชิกที่ใช้งานอยู่</div>
                                </div>
                            </div>
                        </div>
                    </div>

                    {/* Progress */}
                    <div className="mt-20 px-6 text-center">
                        <h3 className="text-gray-600 font-medium">คะแนนสะสมของคุณ</h3>
                        <div className="text-4xl font-bold wurth-red mt-1">{points} <span className="text-xl text-gray-400 font-normal">/ {TOTAL_STAMPS}</span></div>
                    </div>

                    {/* Stamps */}
                    <div className="mx-4 mt-6 bg-white rounded-2xl shadow-md p-5 border border-gray-100">
                        <div className="grid grid-cols-4 gap-4">
                            {Array.from({ length: TOTAL_STAMPS }).map((_, i) => {
                                const isEarned = i < points;
                                const isRecent = i === recentStampIndex;
                                return (
                                    <div key={i} className="relative aspect-square flex items-center justify-center">
                                        <div className={`absolute inset-0 rounded-full border-2 transition-colors duration-300 ${isEarned ? 'border-wurth-red bg-red-50' : 'border-gray-200 bg-gray-50'}`}></div>
                                        {isEarned ? <i className={`fas fa-star wurth-red text-2xl relative z-10 ${isRecent ? 'stamp-animate' : ''}`}></i> : <span className="text-gray-300 font-semibold relative z-10">{i + 1}</span>}
                                        {(!isEarned && (i === 10 || i === 11)) && <i className="fas fa-gift text-gray-300 text-2xl absolute opacity-30 z-0"></i>}
                                    </div>
                                );
                            })}
                        </div>
                        {points >= TOTAL_STAMPS && <div className="mt-6 p-3 bg-green-100 text-green-700 text-center rounded-lg font-bold animate-bounce">🎉 ยินดีด้วย! คุณสะสมแต้มครบแล้ว 🎉</div>}
                    </div>

                    {/* Controls */}
                    <div className="mt-6 px-4 space-y-4 mb-8">
                        <button onClick={scanQRCode} disabled={loading || points >= TOTAL_STAMPS} className={`w-full py-4 rounded-xl text-white font-bold shadow-lg flex items-center justify-center space-x-2 transition-transform active:scale-95 ${points >= TOTAL_STAMPS ? 'bg-gray-400' : 'bg-wurth-red hover:bg-red-700'}`}>
                            <i className="fas fa-qrcode text-xl"></i><span>สแกน QR Code รับแต้ม</span>
                        </button>
                        <div className="relative flex py-2 items-center"><div className="flex-grow border-t border-gray-300"></div><span className="flex-shrink-0 mx-4 text-gray-400 text-sm">หรือกรอกรหัสด้วยตัวเอง</span><div className="flex-grow border-t border-gray-300"></div></div>
                        <div className="flex space-x-2">
                            <input type="text" value={pinInput} onChange={(e) => setPinInput(e.target.value.toUpperCase())} placeholder="กรอกรหัสสะสมแต้ม..." disabled={loading || points >= TOTAL_STAMPS} className="flex-1 bg-white border border-gray-300 text-gray-900 text-sm rounded-xl focus:ring-wurth-red focus:border-wurth-red block p-3 shadow-sm uppercase" />
                            <button onClick={() => handleClaimToken(pinInput)} disabled={!pinInput || loading || points >= TOTAL_STAMPS} className="bg-gray-800 hover:bg-black text-white px-6 rounded-xl font-bold shadow-sm disabled:bg-gray-400 active:scale-95 transition-transform">ยืนยัน</button>
                        </div>
                    </div>

                    {/* Toast & Overlay */}
                    {message.show && <div className="fixed top-5 left-1/2 transform -translate-x-1/2 z-50 w-[90%] max-w-sm"><div className={`p-4 rounded-xl shadow-xl text-center text-white font-medium ${message.type === 'error' ? 'bg-red-600' : message.type === 'warning' ? 'bg-yellow-500' : 'bg-green-600'}`}>{message.text}</div></div>}
                    {loading && profile && <div className="fixed inset-0 bg-black/20 backdrop-blur-sm z-40 flex items-center justify-center"><div className="bg-white p-4 rounded-xl shadow-lg flex items-center space-x-3"><div className="animate-spin rounded-full h-6 w-6 border-b-2 border-wurth-red"></div><span className="font-medium text-gray-700">กำลังประมวลผล...</span></div></div>}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
